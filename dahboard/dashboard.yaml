button_card_templates:
  customcard_style_locked:
    variables:
      lockentity: null
    styles:
      card:
        - box-shadow: >-
            [[[ return states[variables.lockentity]?.state == 'on' ? 'rgba(0, 0,
            0, 0.3) 0px 1px 3px 0px' : 'none' ]]]
        - pointer-events: >-
            [[[ return states[variables.lockentity]?.state == 'on' ? 'auto' :
            'none' ]]]
      name:
        - pointer-events: >-
            [[[ return states[variables.lockentity]?.state == 'on' ? 'auto' :
            'none' ]]]
      icon:
        - pointer-events: >-
            [[[ return states[variables.lockentity]?.state == 'on' ? 'auto' :
            'none' ]]]
  customcard_inverter_style:
    section_mode: true
    show_state: false
    variables:
      activecolor: black
      alternatecolor: ''
    styles:
      grid:
        - grid-template-areas: '"i" "n"'
        - grid-template-columns: 1fr
        - grid-template-rows: minmax(0, 1fr) 40%
        - align-items: center
      card:
        - padding: 0
        - border-radius: var(--ha-card-border-radius, 12px)
        - user-select: none
      name:
        - justify-self: start
        - padding-left: 0px
        - font-weight: 500
        - font-size: 14px
        - align-self: middle
        - white-space: break-spaces;
        - display: flex
        - margin: 0px auto
        - color: >
            [[[ return variables.activecondition ? variables.activecolor :
            'var(--tile-name-text-color)' ]]]
      img_cell:
        - justify-content: center
        - align-items: center
        - margin: none
      icon:
        - width: 30px
        - justify-content: center
        - align-items: center
        - color: |
            [[[ if (variables.alternatecolor) return variables.alternatecolor;
                else if (variables.activecondition) return variables.activecolor;
                else  return 'var(--tile-name-text-color)';
            ]]]
  customcard_altname_color:
    variables:
      activecolor: null
      defaultcolor: color-mix(in srgb, var(--tile-name-text-color) 45%, transparent)
    styles:
      name:
        - color: >
            [[[  return variables.activecolor ? variables.activecolor :
            variables.defaultcolor; ]]]
  customcard_phase_style:
    template: customcard_style_locked
    show_icon: false
    show_state: false
    state:
      - operator: '=='
        value: '[[[ return variables.phase ]]]'
        styles:
          card:
            - background-color: >-
                [[[ return "color-mix(in srgb, " + variables.color + " 45%,
                transparent)" ]]]
          name:
            - color: var(--secondary-text-color)
    styles:
      grid:
        - grid-template-areas: '"n"'
        - grid-template-columns: 1fr
        - grid-template-rows: 1fr
      card:
        - padding: 0
        - border-radius: var(--ha-card-border-radius, 12px)
        - user-select: none
        - height: 46px
      name:
        - justify-self: start
        - padding-left: 0px
        - font-weight: 400
        - font-size: 12px
        - align-self: middle
        - white-space: normal
        - display: flex
        - margin: auto
        - color: color-mix(in srgb, var(--tile-name-text-color) 45%, transparent)
views:
  - type: sections
    max_columns: 4
    title: FVE2
    path: fve2
    sections:
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: input_boolean.pv_ctrl_edit_mode
                name: Edit Mode
          - type: custom:button-card
            template:
              - customcard_inverter_style
              - customcard_style_locked
            variables:
              lockentity: input_boolean.pv_ctrl_edit_mode
              activecolor: var(--purple-color)
              activecondition: |
                [[[
                    return (
                          states['sensor.wattsonic_hybrid_inverter_working_mode_setting_text'].state == 'Economic mode' &&
                          states['sensor.wattsonic_battery_mode_text'].state == 'discharge' &&
                          Number(states['sensor.wattsonic_ecomode_period1_chargedischarge_setting'].state) == 2
                        )
                ]]]
              alternatecolor: >
                [[[ return
                Number(states['sensor.wattsonic_grid_injection_power_limit_setting'].state)
                > 0 ? '' : 'orange' ]]]
            name: Discharge<br>To&nbsp;Grid
            icon: >
              [[[ return
              Number(states['sensor.wattsonic_grid_injection_power_limit_setting'].state)
              > 0 ? 'mdi:transmission-tower-import' :
              'mdi:transmission-tower-off' ]]]
            tap_action:
              action: perform-action
              perform_action: script.pv_ctrl_inverter
              data:
                mode: discharge_grid
            confirmation:
              text: Are you sure, to enable Discharge?
            grid_options:
              columns: 4
          - type: custom:button-card
            template:
              - customcard_inverter_style
              - customcard_style_locked
            variables:
              lockentity: input_boolean.pv_ctrl_edit_mode
              activecolor: var(--energy-battery-out-color)
              activecondition: |
                [[[
                    return (states['sensor.wattsonic_hybrid_inverter_working_mode_setting_text'].state == 'General mode' &&
                    Number(states['sensor.wattsonic_charge_current_limit'].state) > 0)
                ]]]
            name: General<br>Mode
            icon: mdi:transmission-tower
            tap_action:
              action: perform-action
              perform_action: script.pv_ctrl_inverter
              data:
                mode: general
            confirmation:
              text: Are you sure, to enable General Mode?
            grid_options:
              columns: 4
          - type: custom:button-card
            template:
              - customcard_inverter_style
              - customcard_style_locked
            variables:
              lockentity: input_boolean.pv_ctrl_edit_mode
              activecolor: var(--energy-solar-color)
              activecondition: |
                [[[
                    return (
                        states['sensor.wattsonic_hybrid_inverter_working_mode_setting_text'].state == 'General mode' &&
                        Number(states['sensor.wattsonic_charge_current_limit'].state) == 0
                        )
                ]]]
            name: General mode,<br>No&nbsp;charge
            icon: mdi:solar-power
            tap_action:
              action: perform-action
              perform_action: script.pv_ctrl_inverter
              data:
                mode: charge_disabled
              target: {}
            confirmation:
              text: Are you sure, to enable No Battery Mode?
            grid_options:
              columns: 4
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template: customcard_phase_style
                entity: input_select.pv_ctrl_phase
                variables:
                  phase: General
                  color: var(--energy-battery-out-color)
                name: General
              - type: custom:button-card
                template: customcard_phase_style
                entity: input_select.pv_ctrl_phase
                variables:
                  phase: Morning Discharge
                  color: var(--purple-color)
                name: Morning Discharge
              - type: custom:button-card
                template: customcard_phase_style
                entity: input_select.pv_ctrl_phase
                variables:
                  phase: Delayed Charge
                  color: var(--energy-solar-color)
                name: Delayed<br>Charge
              - type: custom:button-card
                template: customcard_phase_style
                entity: input_select.pv_ctrl_phase
                variables:
                  phase: Cheapest Charge
                  color: var(--energy-solar-color)
                name: Cheapest<br>Charge
              - type: custom:button-card
                template: customcard_phase_style
                entity: input_select.pv_ctrl_phase
                variables:
                  phase: Evening Discharge
                  color: var(--purple-color)
                name: Evening Discharge
            grid_options:
              columns: 12
              rows: auto
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                template:
                  - customcard_phase_style
                  - customcard_altname_color
                entity: input_select.pv_ctrl_phase
                variables:
                  lockentity: input_boolean.pv_ctrl_edit_mode
                  activecolor: >
                    [[[ return
                    Number(states['sensor.wattsonic_grid_injection_power_limit_setting'].state)
                    == 0 ? 'orange' : null ]]]
                name: Injection Disabled
                tap_action:
                  action: perform-action
                  perform_action: script.pv_ctrl_inverter
                  data:
                    mode: injection_disabled
                confirmation:
                  text: Are you sure, to DISABLE injection to the grid?
              - type: custom:button-card
                template:
                  - customcard_phase_style
                  - customcard_altname_color
                entity: input_select.pv_ctrl_phase
                variables:
                  lockentity: input_boolean.pv_ctrl_edit_mode
                  activecolor: >
                    [[[ return
                    Number(states['sensor.wattsonic_grid_injection_power_limit_setting'].state)
                    == 0 ? null : 'var(--energy-battery-out-color)' ]]]
                name: Injection Enabled
                tap_action:
                  action: perform-action
                  perform_action: script.pv_ctrl_inverter
                  data:
                    mode: injection_enabled
                confirmation:
                  text: Are you sure, to ENABLE injection to the grid?
            grid_options:
              columns: 12
              rows: auto
          - type: entities
            entities:
              - entity: sensor.pv_ctrl_most_expensive_hours_morning
                name: Morning Discharge
                secondary_info: state
              - entity: sensor.pv_ctrl_cheapest_hours
                name: Cheapest Charge
                secondary_info: state
              - entity: sensor.pv_ctrl_most_expensive_hours_evening
                name: Afternoon Discharge
                secondary_info: state
              - type: divider
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: Solcast today
              - entity: sensor.solcast_pv_forecast_forecast_remaining_today
                name: Solcast today remaining
              - entity: sensor.solcast_pv_forecast_forecast_tomorrow
                name: Solcast tomorrow
          - type: custom:config-template-card
            variables:
              min_sun: |
                (() => { 
                  const s =  states['input_number.pv_ctrl_min_suncast_current_day']?.state;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return 0;
                  return Number(s);
                })()  
            entities:
              - input_number.pv_ctrl_min_suncast_current_day
            card:
              type: custom:apexcharts-card
              header:
                show: true
                title: Solar Forecast (7 days)
              graph_span: 6d
              span:
                start: day
              apex_config:
                chart:
                  height: 150px
                grid:
                  borderColor: rgba(118,128,128, 0.2)
                xaxis:
                  type: datetime
                  min: |
                    new Date().setHours(0,0,0,0)
                  max: |
                    new Date(new Date().setHours(0,0,0,0) + 7*24*60*60*1000)
                annotations:
                  yaxis:
                    - 'y': ${min_sun}
                      borderColor: '#00AA00'
                      strokeDashArray: 4
                      label:
                        text: ${min_sun + 'kWh'}
                        borderWidth: 0
                        style:
                          background: DimGrey
                          color: white
              series:
                - entity: sensor.solcast_pv_forecast_forecast_today
                  name: Forecast
                  color: Grey
                  opacity: 0.3
                  type: column
                  data_generator: |
                    const entities = [
                      'sensor.solcast_pv_forecast_forecast_today',
                      'sensor.solcast_pv_forecast_forecast_tomorrow',
                      'sensor.solcast_pv_forecast_forecast_day_3',
                      'sensor.solcast_pv_forecast_forecast_day_4',
                      'sensor.solcast_pv_forecast_forecast_day_5',
                      'sensor.solcast_pv_forecast_forecast_day_6',
                      'sensor.solcast_pv_forecast_forecast_day_7'
                    ];

                    const now = new Date(); 
                    const result = [];

                    entities.forEach((entityId, index) => {
                      const stateObj = hass.states[entityId];
                      if (!stateObj) return;

                      const value = parseFloat(stateObj.state);
                      if (isNaN(value)) return;

                      // create date for each day (today + index)
                      const d = new Date();
                      d.setHours(0,0,0,0); 
                      d.setDate(d.getDate() + index);
                      result.push([d, value]);
                    });

                    return result;
            grid_options:
              columns: full
        column_span: 1
      - type: grid
        cards:
          - type: custom:config-template-card
            variables:
              startCharging: |
                (() => {
                  const s = states['sensor.pv_ctrl_cheapest_hours']?.attributes?.data?.start;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              endCharging: |
                (() => {
                  const s = states['sensor.pv_ctrl_cheapest_hours']?.attributes?.data?.end;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              startDischargingEvening: |
                (() => {
                  const s = states['sensor.pv_ctrl_most_expensive_hours_evening']?.attributes?.data?.start;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              endDischargingEvening: |
                (() => {
                  const s = states['sensor.pv_ctrl_most_expensive_hours_evening']?.attributes?.data?.end;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              startDischargingMorning: |
                (() => {
                  const s = states['sensor.pv_ctrl_most_expensive_hours_morning']?.attributes?.data?.start;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              endDischargingMorning: |
                (() => {
                  const s = states['sensor.pv_ctrl_most_expensive_hours_morning']?.attributes?.data?.end;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return new Date().setHours(0,0,0,0);
                  return new Date(s).getTime();
                })()
              min_export_price: |
                (() => { 
                  const s =  states['input_number.pv_ctrl_min_export_price']?.state;
                  if (!s || s === 'unknown' || s === 'unavailable' || s === 'undefined') return 0;
                  return Number(s);
                })()  
            entities:
              - sensor.pv_ctrl_cheapest_hours
              - sensor.pv_ctrl_most_expensive_hours_morning
              - sensor.pv_ctrl_most_expensive_hours_evening
              - input_number.pv_ctrl_min_export_price
            card:
              type: custom:apexcharts-card
              update_interval: 1min
              header:
                show: true
                title: Electricity spot price
                show_states: true
                colorize_states: true
              graph_span: 48h
              span:
                start: day
              now:
                show: true
                label: Now
                color: '#448866'
              series:
                - entity: sensor.pv_ctrl_spot_electricity_prices
                  name: Current spot price
                  show:
                    in_chart: false
                    in_header: true
                    name_in_header: true
                - entity: sensor.pv_ctrl_spot_electricity_prices
                  name: Spot price
                  type: line
                  data_generator: >
                    const src =
                    hass.states['sensor.pv_ctrl_spot_electricity_prices'];

                    if (!src || !src.attributes.data) return [];


                    return src.attributes.data.map((item) => {
                      return [
                        new Date(item.time).getTime(),
                        item.price
                      ];
                    });
                  stroke_width: 1
                  curve: stepline
                  show:
                    in_chart: true
                    in_header: false
                - entity: sensor.sql_pv_earnings_today
                  transform: >-
                    return
                    hass.states['sensor.sql_pv_earnings_today'].attributes.avoided;
                  name: Avoided
                  show:
                    in_chart: false
                    in_header: true
                - entity: sensor.sql_pv_earnings_today
                  transform: >-
                    return
                    hass.states['sensor.sql_pv_earnings_today'].attributes.sold;
                  name: Sold
                  show:
                    in_chart: false
                    in_header: true
                - entity: sensor.sql_pv_earnings_today
                  transform: >-
                    return
                    hass.states['sensor.sql_pv_earnings_today'].attributes.purchased;
                  name: Purchased
                  show:
                    in_chart: false
                    in_header: true
              apex_config:
                grid:
                  borderColor: rgba(118,128,128, 0.2)
                xaxis:
                  type: datetime
                annotations:
                  xaxis:
                    - x: EVAL:new Date().setHours(24,0,0,0)
                      borderColor: '#888888'
                      strokeDashArray: 1
                      label:
                        text: Tomorrow
                        borderWidth: 0
                        style:
                          background: DimGrey
                          color: white
                          border: 0px
                    - x: ${startDischargingMorning}
                      x2: ${endDischargingMorning}
                      fillColor: var(--purple-color)
                      opacity: 0.2
                    - x: ${startDischargingEvening}
                      x2: ${endDischargingEvening}
                      fillColor: var(--purple-color)
                      opacity: 0.2
                    - x: ${startCharging}
                      x2: ${endCharging}
                      fillColor: '#B3F7CA'
                      opacity: 0.3
                  yaxis:
                    - 'y': ${min_export_price}
                      borderColor: '#00AA00'
                      strokeDashArray: 4
                      label:
                        text: ${min_export_price + ' threshold'}
                        borderWidth: 0
                        style:
                          background: DimGrey
                          color: white
          - type: custom:apexcharts-card
            header:
              title: Solar forecast
              show: true
              show_states: true
              colorize_states: true
            now:
              show: true
              label: Now
              color: '#448866'
            apex_config:
              chart:
                height: 300px
              tooltip:
                enabled: true
                shared: true
                followCursor: true
              xaxis:
                type: datetime
                max: |
                  EVAL:(function(){
                    let d = new Date();
                    d.setDate(d.getDate()+1);
                    d.setHours(23,59,59,0);
                    return d.getTime();
                  })()
              annotations:
                xaxis:
                  - x: EVAL:new Date().setHours(24,0,0,0)
                    borderColor: '#888888'
                    strokeDashArray: 1
                    label:
                      text: Tomorrow
                      borderWidth: 0
                      style:
                        background: DimGrey
                        color: white
                        border: 0px
              grid:
                borderColor: rgba(118,128,128, 0.2)
            graph_span: 48h
            span:
              start: day
            yaxis:
              - id: capacity
                show: true
                opposite: true
                decimals: 0
                max: 100
                min: 0
                apex_config:
                  tickAmount: 10
              - id: kWh
                show: true
                min: 0
                apex_config:
                  tickAmount: 10
              - id: header_only
                show: false
            series:
              - entity: sensor.wattsonic_pv_input_total_power
                name: Production
                type: line
                stroke_width: 2
                float_precision: 2
                color: Orange
                opacity: 0.9
                yaxis_id: kWh
                unit: kW
                extend_to: now
                show:
                  legend_value: false
                  in_header: false
                group_by:
                  func: avg
                  duration: 30m
              - entity: sensor.pv_ctrl_solar_forecast_today
                name: Forecast 10%
                color: Grey
                opacity: 0.3
                stroke_width: 0
                type: area
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: >-
                  const today = entity.attributes.data.map((entry) => {
                    return [new Date(entry.time), entry.power_10];
                  });

                  const tomorrowEntity =
                  hass.states['sensor.pv_ctrl_solar_forecast_tomorrow'];

                  if (!tomorrowEntity || !tomorrowEntity.attributes.data) return
                  today;

                  const tomorrow = tomorrowEntity.attributes.data.map((entry) =>
                  {
                    return [new Date(entry.time), entry.power_10];
                  });

                  return today.concat(tomorrow);
              - entity: sensor.pv_ctrl_solar_forecast_today
                name: Forecast 50%
                color: Grey
                opacity: 0.3
                stroke_width: 0
                type: area
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: >-
                  const today = entity.attributes.data.map((entry) => {
                    return [new Date(entry.time), entry.power_50];
                  });

                  const tomorrowEntity =
                  hass.states['sensor.pv_ctrl_solar_forecast_tomorrow'];

                  if (!tomorrowEntity || !tomorrowEntity.attributes.data) 
                  return today;

                  const tomorrow = tomorrowEntity.attributes.data.map((entry) =>
                  {
                    return [new Date(entry.time), entry.power_50];
                  }); return today.concat(tomorrow);
              - entity: sensor.pv_ctrl_solar_forecast_today
                name: Forecast 90%
                color: Grey
                opacity: 0.1
                stroke_width: 0
                type: area
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: >-
                  const today = entity.attributes.data.map((entry) => {
                    return [new Date(entry.time), entry.power_90];
                  }); 

                  const tomorrowEntity =
                  hass.states['sensor.pv_ctrl_solar_forecast_tomorrow'];

                  if (!tomorrowEntity || !tomorrowEntity.attributes.data) {
                    return today;
                  }

                  const tomorrow = tomorrowEntity.attributes.data.map((entry) =>
                  {
                    return [new Date(entry.time), entry.power_90];
                  });

                  return today.concat(tomorrow);
              - entity: sensor.pv_ctrl_solar_forecast_today
                name: Forecast Balanced
                color: '#3498db'
                opacity: 0.9
                stroke_width: 1
                type: line
                stroke_dash: 6
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: >-
                  const today = entity.attributes.data.map((entry) => {
                    return [new Date(entry.time), entry.power_balanced];
                  });

                  const tomorrowEntity =
                    hass.states['sensor.pv_ctrl_solar_forecast_tomorrow'];

                  if (!tomorrowEntity || !tomorrowEntity.attributes.data) {
                    return today;
                  }

                  const tomorrow = tomorrowEntity.attributes.data.map((entry) =>
                  {
                    return [new Date(entry.time), entry.power_balanced];
                  });

                  return today.concat(tomorrow);
              - entity: sensor.pv_ctrl_solar_forecast_today
                yaxis_id: header_only
                name: Today Forecast
                color: Grey
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.solcast_pv_forecast_forecast_remaining_today
                yaxis_id: header_only
                name: Remaining Today
                color: Grey
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.wattsonic_pv_generation_energy_on_that_day
                yaxis_id: header_only
                name: Production Today
                color: Orange
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.pv_ctrl_solar_forecast_tomorrow
                yaxis_id: header_only
                name: Tomorrow Forecast
                color: Grey
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
      - type: grid
        cards:
          - type: custom:power-flow-card-plus
            title: Distribution
            card_mod:
              style:
                ha-card $: |
                  h1.card-header { padding-top: 8px; }
                .: |
                  ha-card {
                    --ha-card-header-font-size: 16px;
                    --ha-font-weight-normal: var(--ha-card-header-font-weight);
                    --ha-card-header-color: var(--secondary-text-color)
                   }
            w_decimals: 2
            kw_decimals: 2
            watt_threshold: 999
            clickable_entities: true
            entities:
              home:
                entity: sensor.wattsonic_home_consumption_now
                subtract_individual: false
                override_state: true
                use_metadata: false
              grid:
                color_circle: true
                color_value: false
                invert_state: true
                display_state: one_way
                entity: sensor.wattsonic_total_power_on_meter
              solar:
                entity: sensor.wattsonic_pv_input_total_power
                icon: mdi:weather-sunny
              battery:
                state_of_charge: sensor.wattsonic_battery_soc
                entity: sensor.wattsonic_battery_p
                show_state_of_charge: true
                state_of_charge_unit_white_space: false
                color_circle: true
                use_metadata: false
              fossil_fuel_percentage:
                secondary_info: {}
                use_metadata: false
                unit_white_space: true
            inverted_entities: grid
            use_new_flow_rate_model: true
            display_zero_lines:
              mode: transparency
              transparency: 80
              grey_color:
                - 189
                - 189
                - 189
            disable_dots: false
            sort_individual_devices: false
          - type: custom:apexcharts-card
            stacked: true
            graph_span: 24h
            span:
              start: day
            header:
              show: true
              title: Grid Power & Energy
            yaxis:
              - max: ~2
                min: ~-2
            apex_config:
              xaxis:
                type: datetime
                max: |
                  EVAL:(function(){
                    let d = new Date();
                    d.setDate(d.getDate());
                    d.setHours(23,59,59,0);
                    return d.getTime();
                  })()
              plotOptions:
                bar:
                  columnWidth: 600%
              tooltip:
                enabled: true
                shared: false
                followCursor: true
              grid:
                borderColor: rgba(118,128,128, 0.2)
              legend:
                formatter: |
                  EVAL:function(seriesName, opts) {

                    var data = opts.w.globals.series[opts.seriesIndex];

                    // --- Sum for Injected and Purchased ---
                    if (seriesName === "Injected" || seriesName === "Purchased") {
                      var sum = 0;
                      for (var i = 0; i < data.length; i++) {
                        if (data[i] != null) sum += Math.abs(data[i]);
                      }
                      return seriesName + " (" + sum.toFixed(2) + " kWh)";
                    }

                    // --- Default behaviour for other series: show latest value ---
                    var latest = null;
                    for (var j = data.length - 1; j >= 0; j--) {
                      if (data[j] != null) {
                        latest = data[j];
                        break;
                      }
                    }

                    if (latest !== null) {
                      return seriesName + " (" + latest.toFixed(2) + " kW)";
                    }

                    return seriesName;
                  }
